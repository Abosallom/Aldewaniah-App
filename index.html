<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <!-- Content-Security-Policy: limits where code can load from and where data can
       be sent (defense-in-depth against XSS/exfiltration). Allowlists exactly the
       services the app uses: Firebase + reCAPTCHA, the two Cloudflare Workers,
       the Aladhan prayer API, FormSubmit, Google Fonts, and the bracket iframes. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://www.recaptcha.net https://apis.google.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: blob: https:;
    media-src 'self' blob: https://aldewaniah-media.mulhaqdb.workers.dev;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://aldewaniah-media.mulhaqdb.workers.dev https://aldewaniah-ai.mulhaqdb.workers.dev https://api.aladhan.com https://formsubmit.co https://www.google.com;
    frame-src 'self' https://www.google.com https://www.recaptcha.net https://aldewaniah-45158.firebaseapp.com https://challonge.com https://brackethq.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self' https://formsubmit.co;
    upgrade-insecure-requests;
  " />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A2744" />
  <title>الديوانية | Al Dewaniah</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Loading splash (inline so it shows before the stylesheet loads) */
    #splash{ position:fixed; inset:0; z-index:1000;
      background:linear-gradient(160deg,#1A2744,#121b30 60%,#0c1322);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; transition:opacity .45s ease; }
    #splash.hide{ opacity:0; pointer-events:none; }
    #splash img{ width:88px; height:88px; border-radius:50%;
      box-shadow:0 10px 36px rgba(0,0,0,.45); animation:splashSpin 1.1s linear infinite; }
    #splash .lt{ color:#C2A050; font-weight:700; letter-spacing:1px; font-size:1rem;
      font-family:"Tajawal",system-ui,sans-serif; }
    @keyframes splashSpin{ to{ transform:rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading splash: spinning logo while the app boots -->
  <div id="splash">
    <img src="assets/icon-192.png" alt="" />
    <div class="lt">جاري التحميل…</div>
  </div>
  <!-- App header -->
  <header class="app-header">
    <div class="brand">
      <img src="assets/icon-192.png" alt="" class="brand-logo" />
      <span class="brand-name" data-i18n="appName">الديوانية</span>
      <button class="app-refresh" aria-label="Refresh" title="تحديث / Refresh" onclick="try{location.reload()}catch(e){}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>
    <div class="header-actions">
      <span id="authBox" class="auth-box"></span>
      <button id="langToggle" class="lang-toggle" aria-label="Toggle language">EN</button>
    </div>
  </header>

  <!-- Module content renders here -->
  <main id="view" class="view"></main>

  <!-- Bottom navigation (built dynamically from registered modules) -->
  <nav id="nav" class="bottom-nav" aria-label="Main"></nav>

  <!-- Invisible reCAPTCHA target for phone login -->
  <div id="recaptcha-container"></div>

  <!-- Firebase SDK (compat) for phone OTP login + members directory -->
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <!-- Core scripts (order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/store.js"></script>
  <script src="js/content.js"></script>
  <script src="js/app.js"></script>

  <!-- Feature modules: add a new <script> line here to plug in a feature.
       Order here sets the order in the bottom navigation. -->
  <script src="js/modules/home.js"></script>
  <script src="js/modules/tournaments.js"></script>
  <script src="js/modules/chat.js"></script>
  <script src="js/modules/sections.js"></script>
  <script src="js/modules/admin.js"></script>

  <!-- Sub-sections (registered into the Sections tab; load after sections.js) -->
  <script src="js/modules/profile.js"></script>
  <script src="js/modules/gallery.js"></script>
  <script src="js/modules/baloot.js"></script>
  <script src="js/modules/buzzer.js"></script>
  <script src="js/modules/times.js"></script>
  <script src="js/modules/roulette.js"></script>
  <script src="js/modules/trix.js"></script>

  <!-- Boot the app after all modules have registered -->
  <script>App.start();</script>

  <!-- Reveal the app once it's booted (spin the logo briefly first) -->
  <script>
    (function () {
      var s = document.getElementById('splash');
      if (!s) return;
      var hide = function () { s.classList.add('hide'); setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 500); };
      setTimeout(hide, 650);
    })();
  </script>

  <!-- Member login (after App so it can refresh views on sign-in) -->
  <script src="js/auth.js"></script>
  <script src="js/install.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/chat-notify.js"></script>
  <script src="js/ai-assistant.js"></script>
  <script src="js/maintenance.js"></script>

  <script>
    /* Auto-update: keep the app on the latest version without quitting/reopening.
       When a new version is deployed, the new service worker installs in the
       background; once ready we activate it and reload the page once. We also
       re-check for updates periodically and whenever the app regains focus. */
    if ('serviceWorker' in navigator) {
      let updating = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (updating) window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          const promote = (worker) => {
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              // A NEW version finished installing (controller exists = this is an
              // update, not the first install) -> activate it now.
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                updating = true;
                worker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          };
          if (reg.waiting && navigator.serviceWorker.controller) {
            updating = true; reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
          reg.addEventListener('updatefound', () => promote(reg.installing));
          const check = () => { reg.update().catch(() => {}); };
          setInterval(check, 60000); // check for a new version every minute
          document.addEventListener('visibilitychange', () => { if (!document.hidden) check(); });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
