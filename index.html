<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A2744" />
  <title>الديوانية | Al Dewaniah</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App header -->
  <header class="app-header">
    <div class="brand">
      <img src="assets/icon.svg" alt="" class="brand-logo" />
      <span class="brand-name" data-i18n="appName">الديوانية</span>
    </div>
    <button id="langToggle" class="lang-toggle" aria-label="Toggle language">EN</button>
  </header>

  <!-- Module content renders here -->
  <main id="view" class="view"></main>

  <!-- Bottom navigation (built dynamically from registered modules) -->
  <nav id="nav" class="bottom-nav" aria-label="Main"></nav>

  <!-- Core scripts (order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>

  <!-- Feature modules: add a new <script> line here to plug in a feature -->
  <script src="js/modules/feed.js"></script>
  <script src="js/modules/events.js"></script>
  <script src="js/modules/members.js"></script>

  <!-- Boot the app after all modules have registered -->
  <script>App.start();</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
