<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Al Dewaniah">
  <rect width="512" height="512" rx="112" fill="#1A2744"/>
  <!-- Arabic dallah (coffee pot) — symbol of the diwaniah gathering -->
  <!-- gold handle + spout behind the body -->
  <g fill="none" stroke="#C2A050" stroke-width="14" stroke-linecap="round">
    <path d="M316 206c36-8 56 4 64 30"/>
    <path d="M196 214c-32 4-48 22-48 54"/>
  </g>
  <!-- cream body -->
  <path fill="#F5F0E6" d="M196 196c0-14 12-22 60-22s60 8 60 22c10 78 6 118-22 150-8 9-22 14-38 14s-30-5-38-14c-28-32-32-72-22-150z"/>
  <!-- maroon inner accent triangle -->
  <path fill="#722F37" d="M256 214l30 120c-9 6-19 9-30 9z"/>
  <!-- gold lid + finial -->
  <path fill="#C2A050" d="M236 160c0-16 8-28 20-28s20 12 20 28h-40z"/>
  <circle cx="256" cy="120" r="11" fill="#C2A050"/>
  <!-- gold base bar -->
  <rect x="200" y="356" width="112" height="16" rx="8" fill="#C2A050"/>
</svg>
